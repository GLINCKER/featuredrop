name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - apps/docs/**
      - docs/**
      - src/**
      - README.md
      - package.json
      - .github/workflows/docs-pages.yml
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build featuredrop package
        run: pnpm build

      - name: Install docs dependencies
        run: pnpm --dir apps/docs install --frozen-lockfile

      - name: Build static docs
        env:
          NEXT_PUBLIC_SITE_URL: https://featuredrop.dev
        run: pnpm --dir apps/docs build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/docs/out --project-name featuredrop --branch main --commit-dirty=true
